name: CD

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to GCE
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCE_HOST }}
          username: ${{ secrets.GCE_USERNAME }}
          key: ${{ secrets.GCE_SSH_KEY }}
          script: |
            set -e

            DEPLOY_DIR="/home/${{ secrets.GCE_USERNAME }}/stockpilot"

            if [ ! -d "$DEPLOY_DIR/.git" ]; then
              rm -rf "$DEPLOY_DIR"
              git clone https://github.com/${{ github.repository }}.git "$DEPLOY_DIR"
            fi

            cd "$DEPLOY_DIR"
            git fetch origin main
            git checkout main
            git pull --ff-only origin main

            cat > .env << 'ENV_EOF'
            ENVIRONMENT=production
            DEBUG=false
            HOST=0.0.0.0
            PORT=8000
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_EXPIRE_MINUTES=${{ secrets.JWT_EXPIRE_MINUTES }}
            UPSTAGE_API_KEY=${{ secrets.UPSTAGE_API_KEY }}
            LLM_MODEL=${{ secrets.LLM_MODEL }}
            EMBEDDING_MODEL=${{ secrets.EMBEDDING_MODEL }}
            EMBEDDING_DIMENSION=${{ secrets.EMBEDDING_DIMENSION }}
            NAVER_CLIENT_ID=${{ secrets.NAVER_CLIENT_ID }}
            NAVER_CLIENT_SECRET=${{ secrets.NAVER_CLIENT_SECRET }}
            DART_API_KEY=${{ secrets.DART_API_KEY }}
            KRX_ID=${{ secrets.KRX_ID }}
            KRX_PW=${{ secrets.KRX_PW }}
            SUPABASE_URL=${{ secrets.SUPABASE_URL }}
            SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}
            RAG_CHUNK_SIZE=${{ secrets.RAG_CHUNK_SIZE }}
            RAG_CHUNK_OVERLAP=${{ secrets.RAG_CHUNK_OVERLAP }}
            RAG_EMBEDDING_BATCH_SIZE=${{ secrets.RAG_EMBEDDING_BATCH_SIZE }}
            FRONTEND_PORT=${{ secrets.FRONTEND_PORT }}
            BACKEND_PORT=${{ secrets.BACKEND_PORT }}
            ENV_EOF

            if docker compose version >/dev/null 2>&1; then
              DOCKER_COMPOSE="docker compose"
            else
              DOCKER_COMPOSE="docker-compose"
            fi

            $DOCKER_COMPOSE down || true
            $DOCKER_COMPOSE up -d --build --remove-orphans

            for i in $(seq 1 12); do
              if curl -fsS http://localhost:8000/api/v1/health/ >/dev/null; then
                echo "Backend health check passed"
                exit 0
              fi
              echo "Waiting for backend health check ($i/12)"
              sleep 5
            done

            $DOCKER_COMPOSE logs --tail=100
            exit 1
