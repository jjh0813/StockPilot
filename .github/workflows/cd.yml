name: CD

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  GCP_PROJECT_ID: project-1573ab59-3ab6-44db-b26
  GCE_ZONE: us-central1-f
  GCE_INSTANCE: stockpilot-server
  DEPLOY_PATH: /home/${{ vars.GCE_SSH_USER }}/stockpilot

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate required secrets
        shell: bash
        run: |
          test -n "${{ secrets.GCP_SA_KEY }}" || { echo "Missing secret: GCP_SA_KEY"; exit 1; }
          test -n "${{ vars.GCE_SSH_USER }}" || { echo "Missing variable: GCE_SSH_USER"; exit 1; }

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Write deploy env file
        shell: bash
        run: |
          cat > .env.production <<'EOF'
          ENVIRONMENT=production
          DEBUG=false
          HOST=0.0.0.0
          PORT=8000
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_EXPIRE_MINUTES=${{ secrets.JWT_EXPIRE_MINUTES }}
          UPSTAGE_API_KEY=${{ secrets.UPSTAGE_API_KEY }}
          LLM_MODEL=${{ secrets.LLM_MODEL }}
          EMBEDDING_MODEL=${{ secrets.EMBEDDING_MODEL }}
          EMBEDDING_DIMENSION=${{ secrets.EMBEDDING_DIMENSION }}
          NAVER_CLIENT_ID=${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET=${{ secrets.NAVER_CLIENT_SECRET }}
          DART_API_KEY=${{ secrets.DART_API_KEY }}
          KRX_ID=${{ secrets.KRX_ID }}
          KRX_PW=${{ secrets.KRX_PW }}
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}
          RAG_CHUNK_SIZE=${{ secrets.RAG_CHUNK_SIZE }}
          RAG_CHUNK_OVERLAP=${{ secrets.RAG_CHUNK_OVERLAP }}
          RAG_EMBEDDING_BATCH_SIZE=${{ secrets.RAG_EMBEDDING_BATCH_SIZE }}
          FRONTEND_PORT=${{ secrets.FRONTEND_PORT }}
          BACKEND_PORT=${{ secrets.BACKEND_PORT }}
          EOF

      - name: Prepare SSH key
        shell: bash
        run: |
          printf '%s' "${{ secrets.GCE_SSH_PRIVATE_KEY }}" > "${RUNNER_TEMP}/gce_key"
          chmod 600 "${RUNNER_TEMP}/gce_key"

      - name: Archive deployment bundle
        shell: bash
        run: |
          tar -czf deploy.tar.gz \
            app \
            data \
            deploy \
            frontend \
            Dockerfile \
            docker-compose.yml \
            pyproject.toml \
            uv.lock \
            README.md \
            .env.production

      - name: Upload bundle to GCE over IAP
        shell: bash
        run: |
          gcloud compute scp \
            --project "${GCP_PROJECT_ID}" \
            --zone "${GCE_ZONE}" \
            --tunnel-through-iap \
            --ssh-key-file "${RUNNER_TEMP}/gce_key" \
            deploy.tar.gz \
            "${{ vars.GCE_SSH_USER }}@${GCE_INSTANCE}:~/deploy.tar.gz"

      - name: Deploy on GCE over IAP
        shell: bash
        run: |
          gcloud compute ssh \
            "${{ vars.GCE_SSH_USER }}@${GCE_INSTANCE}" \
            --project "${GCP_PROJECT_ID}" \
            --zone "${GCE_ZONE}" \
            --tunnel-through-iap \
            --ssh-key-file "${RUNNER_TEMP}/gce_key" \
            --command "
              mkdir -p '${DEPLOY_PATH}' &&
              tar -xzf ~/deploy.tar.gz -C '${DEPLOY_PATH}' &&
              mv '${DEPLOY_PATH}/.env.production' '${DEPLOY_PATH}/.env' &&
              cd '${DEPLOY_PATH}' &&
              docker-compose down || true &&
              docker-compose up -d --build --remove-orphans
            "
