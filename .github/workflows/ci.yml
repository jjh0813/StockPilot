name: StockPilot CI

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "data/scripts/**"
      - "tests/**"
      - "Dockerfile"
      - ".dockerignore"
      - "docker-compose.yml"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/**"
  pull_request:
    branches: [main]
    paths:
      - "app/**"
      - "data/scripts/**"
      - "tests/**"
      - "Dockerfile"
      - ".dockerignore"
      - "docker-compose.yml"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v8
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --locked --extra dev

      - name: Run Ruff
        run: uv run ruff check app tests data/scripts --output-format=github

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v8
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --locked --extra dev

      - name: Run tests
        env:
          ENVIRONMENT: test
        run: uv run pytest -v --tb=short

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: stockpilot:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
